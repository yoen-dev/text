ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.nourishwell.ApplicationKt.module ]
    }
}

jwt {
    secret = "nourishwell-dev-secret-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "nourishwell"
    audience = "nourishwell-users"
    realm = "NourishWell"
    expiryDays = 7
}
